<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 40px; max-width: 500px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .team-list { list-style: none; }
        .team-list li { margin-bottom: 10px; }
        .team-list button { width: 100%; padding: 15px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; text-align: left; transition: all 0.3s; }
        .team-list button:hover { background: #667eea; color: white; border-color: #667eea; }
        .dashboard { padding: 20px; background: #f9f9f9; border-radius: 5px; margin-top: 20px; }
        .dashboard h2 { color: #333; margin-bottom: 15px; }
        .dashboard p { color: #666; line-height: 1.6; margin-bottom: 10px; }
        .logout-btn { width: 100%; padding: 10px; background: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        .logout-btn:hover { background: #ff5252; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const users = [
            'Srinivas',
            'Kamal alawadhi',
            'Simmi Khan',
            'Ajay Singh Chauhan',
            'Bhargav Oza',
            'Soubhik Mahata',
            'Yaqub Shaik',
            'Maharshi Vastrala',
            'Nawab Suhail',
            'Aswanth'
        ];

        let currentUser = null;

        function renderApp() {
            const app = document.getElementById('app');
            
            if (!currentUser) {
                app.innerHTML = `
                    <h1>📊 Sales Manager</h1>
                    <div class="subtitle">Ginesys ERP & POS Sales Team</div>
                    <p style="text-align: center; color: #666; margin-bottom: 20px; font-size: 14px;">Select your profile:</p>
                    <ul class="team-list">
                        ${users.map(name => `
                            <li>
                                <button onclick="login('${name}')" style="font-weight: 500;">
                                    ${name}
                                    <span style="float: right; color: #999;">→</span>
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="success" style="margin-top: 30px;">
                        ✅ <strong>App is Working!</strong> Click your name to continue.
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <h1>👋 Welcome, ${currentUser}!</h1>
                    <div class="subtitle">${users[0] === currentUser ? 'Manager Dashboard' : 'Sales Rep Dashboard'}</div>
                    <div class="success">
                        ✅ Sales Manager App is LIVE!
                    </div>
                    <div class="dashboard">
                        <h2>📈 Your Dashboard</h2>
                        <p><strong>User:</strong> ${currentUser}</p>
                        <p><strong>Role:</strong> ${users[0] === currentUser ? 'Manager' : 'Sales Representative'}</p>
                        <p style="margin-top: 20px; color: #667eea;">✓ Log activities</p>
                        <p>✓ Submit DAR reports</p>
                        <p>✓ Track deals</p>
                        <p>✓ View tasks</p>
                        <p>✓ See leaderboard</p>
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                `;
            }
        }

        function login(name) {
            currentUser = name;
            renderApp();
        }

        function logout() {
            currentUser = null;
            renderApp();
        }

        renderApp();
    </script>
</body>
</html>
